name: food_ease
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # UI & Design
  auto_size_text: ^3.0.0
  badges: ^3.1.2  # Upgraded from 2.0.2
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.0
  dotted_decoration: ^2.0.0  # Added based on console output
  expandable: ^5.0.1
  flutter_animate: ^4.5.2  # Upgraded from 4.5.0
  flutter_html: ^3.0.0  # Upgraded from beta
  flutter_spinkit: ^5.2.2  # Upgraded from 5.2.0
  font_awesome_flutter: ^10.12.0  # Upgraded from 10.7.0
  from_css_color: ^2.0.0
  google_fonts: ^7.1.0  # Upgraded from 6.1.0
  nested: ^1.0.0  # Added based on console output
  octo_image: ^2.1.0  # Added based on console output
  page_transition: ^2.2.1  # Upgraded from 2.1.0
  pin_code_fields: ^8.0.1
  provider: ^6.1.5+1  # Upgraded from 6.1.2
  rxdart: ^0.28.0  # Added based on console output
  smooth_page_indicator: ^2.0.1  # Upgraded from 1.1.0
  styled_divider: ^1.0.5  # Upgraded from 1.0.4
  
  # Firebase
  firebase_core: ^4.4.0  # Upgraded from 3.8.0
  firebase_performance: ^0.11.1+4  # Upgraded from 0.10.0+10
  
  # Routing & Navigation
  go_router: ^17.0.1  # Upgraded from 12.1.3
  
  # Storage & Database
  path_provider: ^2.1.5  # Upgraded from 2.1.4
  shared_preferences: ^2.5.4  # Upgraded from 2.3.2
  sqflite: ^2.4.2  # Upgraded from 2.3.3+1
  
  # Utilities
  collection: ^1.19.0
  intl: ^0.20.2  # Must match flutter_localizations requirement
  json_path: ^0.8.0  # Upgraded from 0.7.2
  timeago: ^3.7.1  # Upgraded to resolve intl conflict
  url_launcher: ^6.3.2  # Upgraded from 6.3.0

dev_dependencies:
  flutter_lints: ^6.0.0  # Upgraded from 4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  
  assets:
    - assets/fonts/
    - assets/images/
    - assets/videos/
    - assets/audios/
    - assets/rive_animations/
    - assets/pdfs/
    - assets/jsons/

  fonts:
    - family: TablerIcons
      fonts:
        - asset: assets/fonts/Tabler-Icons.ttf
    - family: Iconx
      fonts:
        - asset: assets/fonts/Iconx.ttf